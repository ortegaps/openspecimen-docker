# ============================================
# OpenSpecimen Configuration
# Compatible con Docker + Tomcat 9 + MySQL 5.7/8.0
# ============================================

# Nombre de la aplicación (debe coincidir con el WAR)
app.name=openspecimen

# JNDI DataSource - SIN java:comp/env/ (Tomcat lo agrega automáticamente)
datasource.jndi=jdbc/openspecimen

# Tipo de base de datos
database.type=mysql

# Tipo de instalación: fresh (nueva) o upgrade (migración de caTissue)
datasource.type=fresh

# Directorios de datos
app.data_dir=/opt/openspecimen/data
plugin.dir=/opt/openspecimen/plugins

# Tomcat directory (requerido por algunas funciones)
tomcat.dir=/usr/local/tomcat
